plugins:
  - rubocop-rails
  - rubocop-performance

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.4
  Exclude:
    - 'db/schema.rb'
    - 'db/migrate/**/*'
    - 'bin/**/*'
    - 'config/**/*'
    - 'vendor/**/*'
    - 'node_modules/**/*'

# -----------------------------------------------
# Style
# -----------------------------------------------

# 日本語コメントを許可
Style/AsciiComments:
  Enabled: false

# クラス・モジュールにドキュメントコードを不要にする
Style/Documentation:
  Enabled: false

# 文字列クォートはダブルクォート固定
Style/StringLiterals:
  EnforcedStyle: double_quotes

# 凍結マジックコメントは不要（Rails管理のため）
Style/FrozenStringLiteralComment:
  Enabled: false

# -----------------------------------------------
# Layout
# -----------------------------------------------

# 1行の最大文字数（デフォルト120に緩和）
Layout/LineLength:
  Max: 120
  Exclude:
    - 'spec/**/*'

# -----------------------------------------------
# Metrics
# -----------------------------------------------

# 除外ファイルの設定
Metrics/BlockLength:
  Exclude:
    - 'db/queue_schema.rb'
    - 'db/schema.rb'

# メソッドの長さ制限を緩和
Metrics/MethodLength:
  Max: 20

# クラスの長さ制限を緩和
Metrics/ClassLength:
  Max: 200

# ABCサイズ（複雑度）を緩和
Metrics/AbcSize:
  Max: 20

# -----------------------------------------------
# Rails
# -----------------------------------------------

Rails/FilePath:
  EnforcedStyle: arguments